<div class="flex flex-col gap-5 pt-2">
  <p-divider></p-divider>
  <form [formGroup]="scoreForm" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1">
      <label for="student" class="px-1 text-sm font-bold">Student</label>
      @if ( this.scoreForm.get('student')?.invalid &&
      this.scoreForm.get('student')?.touched ) {
      <div class="px-1 text-sm text-red-500">Please select a student</div>
      }
      <p-dropdown
        [style]="{ minWidth: '100%' }"
        formControlName="student"
        [filter]="true"
        [options]="students"
        optionLabel="name"
        optionValue="id"
        placeholder="Select a Student"
        inputId="student"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="score" class="px-1 text-sm font-bold">Score</label>
      @if ( this.scoreForm.get('score')?.invalid &&
      this.scoreForm.get('score')?.touched ) {
      <div class="px-1 text-sm text-red-500">Please enter a score</div>
      }
      <input
        pInputText
        [style]="{ minWidth: '100%' }"
        formControlName="score"
        placeholder="Enter score"
        inputId="score"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="note" class="px-1 text-sm font-bold">Note</label>
      <input
        pInputTextarea
        [style]="{ minWidth: '100%' }"
        formControlName="note"
        placeholder="Enter note"
        inputId="note"
      />
    </div>

    <p-button
      (click)="submit()"
      label="Submit"
      icon="pi pi-check"
      severity="success"
    />
  </form>
</div>
<p-confirmDialog
  header="Confirmation"
  icon="pi pi-exclamation-triangle"
></p-confirmDialog>
